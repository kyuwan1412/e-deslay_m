name: e_deslay
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter

  # ================= LOCALIZATION =================
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8
  http: ^1.2.0
  shared_preferences: ^2.2.2
  flutter_svg: ^2.0.9
  image_picker: ^1.1.2
  http_parser: ^4.0.2
  mime: ^1.0.5

  # ================= FIREBASE =================
  firebase_core: ^3.15.1
  firebase_messaging: ^15.1.0
  flutter_local_notifications: ^17.2.2

  # ================= DATE FORMAT =================
  intl: ^0.20.2

  # ================= URL =================
  url_launcher: ^6.3.2

  # ================= DOWNLOAD PDF =================
  dio: ^5.9.0
  path_provider: ^2.1.5
  permission_handler: ^12.0.1
  open_filex: ^4.7.0
  device_info_plus: ^10.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true

  assets:

    # ================= IMAGES =================
    - assets/images/logonganjuk.png
    - assets/images/logolpsandi.png
    - assets/images/banner.png
    - assets/images/searchlogo.png
    - assets/images/logoorang.png
    - assets/images/bgprofil.png
    - assets/images/bannerkegiatan.png
    - assets/images/logoedeslay.png
    - assets/images/logo_edeslay.png
    - assets/images/fotodesa.png
    - assets/images/ikon_sktm.png
    - assets/images/domisili.png
    - assets/images/penghasilan.png
    - assets/images/kelahiran.png
    - assets/images/ktp.png
    - assets/images/kematian.png
    - assets/images/izin.png
    - assets/images/nikah.png

    # ================= SVG =================
    - assets/svg/wave.svg
    - assets/svg/gdregiskanan.svg
    - assets/svg/gdregiskiri.svg

  fonts:
    - family: LemonShake
      fonts:
        - asset: assets/fonts/lemon_shake.ttf

flutter_launcher_icons:
  android: true
  ios: true

  image_path: "assets/images/logo_edeslay.png"

  adaptive_icon_background: "#ffffff"
  adaptive_icon_foreground: "assets/images/logo_edeslay.png"